image:
- Visual Studio 2022
#- macOS
#- Ubuntu
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
build_script:
# https://docs.microsoft.com/en-us/dotnet/core/tools/dotnet-install-script
- pwsh: |
    if ($isWindows) {
      Invoke-WebRequest "https://dot.net/v1/dotnet-install.ps1" -OutFile "./dotnet-install.ps1"
      ./dotnet-install.ps1 -JSonFile global.json -Architecture x64 -InstallDir 'C:\Program Files\dotnet'
    }
    else {
      Invoke-WebRequest "https://dot.net/v1/dotnet-install.sh" -OutFile "./dotnet-install.sh"
      sudo chmod u+x dotnet-install.sh
      if ($isMacOS) {
        sudo ./dotnet-install.sh --jsonfile global.json --architecture x64 --install-dir '/usr/local/share/dotnet'
      } else {
        sudo ./dotnet-install.sh --jsonfile global.json --architecture x64 --install-dir '/usr/share/dotnet'
      }
    }
- dotnet build src --configuration Release
- dotnet test --solution src/NsbAuditFilter.slnx --configuration Release --no-build --no-restore --results-directory TestResults --report-trx

on_failure:
  - ps: |
      $root = (Get-Location).Path
      Get-ChildItem *.received.* -Recurse | % {
        $rel = $_.FullName.Substring($root.Length + 1)
        Push-AppveyorArtifact $_.FullName -FileName $rel
      }
test: off
on_finish:
- pwsh: |
    $url = "https://ci.appveyor.com/api/testresults/mstest/$env:APPVEYOR_JOB_ID"
    $client = [System.Net.WebClient]::new()
    foreach ($trx in Get-ChildItem TestResults -Filter *.trx -Recurse -ErrorAction SilentlyContinue)
    {
      Write-Host "Uploading $($trx.FullName)"
      $client.UploadFile($url, $trx.FullName)
    }
artifacts:
- path: nugets\*.nupkg